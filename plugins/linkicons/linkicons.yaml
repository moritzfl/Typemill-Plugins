name: Link Icons
version: 1.0.0
description: Automatically prepends a small icon to links pointing to GitHub, GitLab, or Docker Hub and other services.
author: moritz
homepage: https://github.com/moritzfl/Typemill-Plugins
license: LGPL

settings:
  appstore: true
  bluesky: true
  codeberg: true
  discord: true
  docker: true
  facebook: true
  flathub: true
  github: true
  gitlab: true
  googleplay: true
  imgur: true
  instagram: true
  lemmy: true
  linkedin: true
  mastodon: true
  microsoftstore: true
  nintendo: true
  pinterest: true
  playstation: true
  pypi: true
  reddit: true
  rss: true
  snapcraft: true
  steam: true
  threads: true
  tiktok: true
  telegram: true
  tumblr: true
  twitch: true
  typemill: true
  twitter: true
  whatsapp: true
  wikipedia: true
  xbox: true
  youtube: true
  external: false
  internal: false
  position: before

forms:
  fields:

    icons:
      type: fieldset
      legend: 'Active Icons'
      fields:
        appstore:
          type: checkbox
          label: 'Apple App Store'
          checkboxlabel: 'linkicons.appstore_label'
        bluesky:
          type: checkbox
          label: 'Bluesky'
          checkboxlabel: 'linkicons.bluesky_label'
        codeberg:
          type: checkbox
          label: 'Codeberg'
          checkboxlabel: 'linkicons.codeberg_label'
        discord:
          type: checkbox
          label: 'Discord'
          checkboxlabel: 'linkicons.discord_label'
        docker:
          type: checkbox
          label: 'Docker Hub'
          checkboxlabel: 'linkicons.docker_label'
        facebook:
          type: checkbox
          label: 'Facebook'
          checkboxlabel: 'linkicons.facebook_label'
