        nintendo:
          type: checkbox
          label: 'Nintendo'
          checkboxlabel: 'linkicons.nintendo_label'
        pinterest:
          type: checkbox
          label: 'Pinterest'
          checkboxlabel: 'linkicons.pinterest_label'
        playstation:
          type: checkbox
          label: 'PlayStation'
          checkboxlabel: 'linkicons.playstation_label'
